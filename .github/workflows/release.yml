name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '🏷 Version tag'
        required: true
        default: 'v9.8'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter>=5.2.0 requests>=2.31.0 urllib3>=2.0.0 cryptography>=41.0.0 psutil>=5.9.0 Pillow>=10.0.0 pystray>=0.19.4 dnspython>=2.4.0 colorama>=0.4.6 speedtest-cli>=2.1.3 matplotlib>=3.7.0 numpy>=1.24.0 selenium>=4.15.0 webdriver-manager>=4.0.0 scapy>=2.5.0 PySocks>=1.7.1 pywebview>=4.0.0 pyzbar>=0.1.9 wmi>=1.5.1 pynvml>=11.525 curl_cffi>=0.6.0 pywin32>=305

      - name: Build EXE with PyInstaller
        working-directory: ./main
        run: |
          python -m PyInstaller --onefile --noconsole --uac-admin --icon=icon.ico `
            --add-data "cores;cores" `
            --add-data "xray;xray" `
            --collect-all customtkinter `
            --collect-all pyzbar `
            --collect-all cryptography `
            --collect-all matplotlib `
            --collect-all numpy `
            --collect-all curl_cffi `
            --collect-all pywebview `
            --collect-all pystray `
            --hidden-import dns.resolver `
            --hidden-import dns.exception `
            --hidden-import dns.flags `
            --hidden-import dns.edns `
            --hidden-import dns.query `
            --hidden-import dns.message `
            --hidden-import pystray._util.win32 `
            --hidden-import pystray._win32 `
            --hidden-import wmi `
            --hidden-import pynvml `
            --hidden-import scapy `
            --hidden-import selenium `
            --hidden-import webdriver_manager `
            --hidden-import speedtest `
            --name NetTools_Pro main.pyw

      - name: Create ZIP Package
        working-directory: ./main
        run: |
          if (Test-Path .\xray) { Copy-Item -Path .\xray -Destination .\dist\xray -Recurse -Force }
          Compress-Archive -Path .\dist\* -DestinationPath .\NetTools_Pro_Release.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
          files: main/NetTools_Pro_Release.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
