name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # این اکشن فقط زمانی اجرا میشه که تگ ورژن جدید بزنی (مثلا v1.0.2)

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest # ساخت روی سرور ویندوز برای خروجی exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # نصب مستقیم نیازمندی‌ها. customtkinter برای رابط گرافیکی ضروریه.
          pip install pyinstaller customtkinter requests urllib3

      - name: Build EXE with PyInstaller
        # با استفاده از working-directory به ربات میگیم اول برو داخل پوشه maim
        working-directory: ./maim
        run: |
          # دستور ساخت. چون رابط گرافیکی داریم، از --noconsole استفاده میکنیم تا صفحه سیاه ترمینال باز نشه.
          pyinstaller --onefile --noconsole --name NetTools_Pro main.pyw

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          # چون ربات داخل پوشه maim فایل رو ساخته، مسیر خروجی هم تغییر میکنه
          files: maim/dist/NetTools_Pro.exe 
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
